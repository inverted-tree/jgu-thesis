name: Release

on:
  workflow_run:
    workflows: [Check]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to submit (e.g. 0.2.0)"
        required: true

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2

      - name: Check version change
        id: version
        run: |
          OLD=$(git show HEAD~1:typst.toml | grep '^version' | cut -d'"' -f2)
          NEW=$(grep '^version' typst.toml | cut -d'"' -f2)
          if [ "$OLD" != "$NEW" ]; then
            echo "tag=$NEW" >> $GITHUB_OUTPUT
          fi

      - uses: typst-community/setup-typst@v4
        if: steps.version.outputs.tag

      - name: Install package locally
        if: steps.version.outputs.tag
        run: |
          VERSION=$(grep '^version' typst.toml | sed 's/.*= "\(.*\)"/\1/')
          NAME=$(grep '^name' typst.toml | sed 's/.*= "\(.*\)"/\1/')
          DEST="$HOME/.local/share/typst/packages/local/$NAME/$VERSION"
          mkdir -p "$DEST"
          cp -r . "$DEST"

      - name: Generate PDF and images
        if: steps.version.outputs.tag
        run: |
          typst compile templates/main.typ templates/main.pdf
          typst compile templates/main.typ img/thumbnail.png --pages 1
          typst compile templates/main.typ img/ch1.png --pages 5
          typst compile templates/main.typ img/abst.png --pages 3
          typst compile templates/main.typ img/bib.png --pages 12

      - name: Update README version
        if: steps.version.outputs.tag
        run: |
          sed -i 's|@local/jgu-mint-thesis:[0-9.]*|@local/jgu-mint-thesis:${{ steps.version.outputs.tag }}|g' README.md

      - name: Commit PDF, images and README
        if: steps.version.outputs.tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add templates/main.pdf img/thumbnail.png img/ch1.png img/abst.png img/bib.png README.md
          git diff --staged --quiet || git commit -m "Create release ${{ steps.version.outputs.tag }}"
          git push origin main

      - name: Tag release
        if: steps.version.outputs.tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create release
        if: steps.version.outputs.tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes=$(awk '/^## ${{ steps.version.outputs.tag }}/{found=1; next} found && /^## /{exit} found{print}' README.md | sed '/^[[:space:]]*$/d')
          gh release create ${{ steps.version.outputs.tag }} --title ${{ steps.version.outputs.tag }} --notes "$notes"

      - name: Submit to Typst Universe
        if: steps.version.outputs.tag || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.TYPST_PACKAGES_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.tag || inputs.version }}
          NAME=$(grep '^name' typst.toml | sed 's/.*= "\(.*\)"/\1/')
          BRANCH="$NAME/$VERSION"

          gh repo fork typst/packages --clone
          cd packages
          git checkout -b "$BRANCH"

          DEST="packages/preview/$NAME/$VERSION"
          mkdir -p "$DEST"
          cp ../typst.toml "$DEST/"
          cp ../lib.typ "$DEST/"
          cp ../LICENSE "$DEST/"
          cp ../README.md "$DEST/"
          mkdir -p "$DEST/templates"
          cp ../templates/main.typ "$DEST/templates/"
          cp ../templates/refs.yml "$DEST/templates/"
          cp -r ../img "$DEST/"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DEST"
          git commit -m "$NAME:$VERSION"
          git push origin "$BRANCH"

          FORK_OWNER=$(gh api user --jq .login)
          gh pr create \
            --repo typst/packages \
            --title "$NAME:$VERSION" \
            --body "Automated submission of \`$NAME\` version \`$VERSION\`." \
            --head "$FORK_OWNER:$BRANCH" \
            --base main
